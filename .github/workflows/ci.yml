name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: engine (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/TranscodeEngine.Api/TranscodeEngine.Api.csproj

      - name: Build
        run: dotnet build src/TranscodeEngine.Api/TranscodeEngine.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test src/TranscodeEngine.Api.Tests/TranscodeEngine.Api.Tests.csproj --configuration Release
